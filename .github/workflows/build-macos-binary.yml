name: Build binary for macOS x86_64

on:
  release:
    types: [ created ]

  workflow_dispatch:

permissions: {}

env:
  BINARY_NAME: 'whatsdiff-macos-x86_64'
  BINARY_MCP_NAME: 'whatsdiff-mcp-macos-x86_64'
  COMPILE_PHP_VERSION: "8.4"


jobs:
  build-macos-binary:
    runs-on: macos-15-intel
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Install macOS missing packages and mark os suffix
        run: |
          brew install automake gzip
          echo "SPC_BUILD_OS=macos" >> $GITHUB_ENV

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ env.COMPILE_PHP_VERSION }}
          tools: pecl, composer
          extensions: curl, openssl, mbstring, tokenizer
          ini-values: memory_limit=-1

      - name: Cache build dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/
          key: build-deps-php${{ env.COMPILE_PHP_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer update
        run: composer update --prefer-dist --no-progress --optimize-autoloader

      - name: Build Binaries
        run: ./build.sh --name "${{ env.BINARY_NAME }}" --mcp-name "${{ env.BINARY_MCP_NAME }}"

      - if: ${{ github.event_name == 'workflow_dispatch' }}
        name: Upload whatsdiff binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}
          path: build/bin/${{ env.BINARY_NAME }}

      - if: ${{ github.event_name == 'workflow_dispatch' }}
        name: Upload whatsdiff-mcp binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_MCP_NAME }}
          path: build/bin/${{ env.BINARY_MCP_NAME }}

      - if: ${{ github.event_name != 'workflow_dispatch' }}
        name: Upload binaries to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.4.1
        with:
          files: |
            build/bin/${{ env.BINARY_NAME }}
            build/bin/${{ env.BINARY_MCP_NAME }}
