name: Build binary for windows x86_64

on:
  release:
    types: [ created ]

  workflow_dispatch:

permissions: {}

env:
  BINARY_NAME: 'whatsdiff-windows-x86_64.exe'
  COMPILE_PHP_VERSION: "8.4"


jobs:
  build-windows-binary:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ env.COMPILE_PHP_VERSION }}
          tools: composer:v2

      - name: Cache build dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/
          key: build-deps-php${{ env.COMPILE_PHP_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Get composer cache directory
        id: composer-cache
        run: |
          $dir = composer config cache-files-dir
          echo "dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**\\composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer update
        run: composer update --prefer-dist --no-progress --optimize-autoloader

      - name: Build .phar file
        shell: bash
        env:
          BOX_REQUIREMENT_CHECKER: 0
        run: ./vendor/bin/box compile --config=box.json --allow-composer-check-failure --composer-bin "$(which composer)"

      - name: Checkout static-php-cli
        working-directory: build
        shell: pwsh
        run: |
          if (Test-Path "static-php-cli") {
            Set-Location "static-php-cli"
            git pull origin main
          } else {
            git clone --depth 1 https://github.com/crazywhalecc/static-php-cli.git
          }

      - name: Composer update
        working-directory: build/static-php-cli/
        run: composer update --no-dev --classmap-authoritative

      - name: SPC doctor
        working-directory: build/static-php-cli/
        run: ./bin/spc doctor

#      - name: SPC Install UPX
#        working-directory: build/static-php-cli/
#        run: ./bin/spc install-pkg upx

      - name: SPC Download
        working-directory: build/static-php-cli/
        run: ./bin/spc download --with-php="${{ env.COMPILE_PHP_VERSION }}" --for-extensions="ctype,curl,dom,filter,libxml,mbstring,openssl,phar,simplexml,xml,xmlwriter,zlib" --prefer-pre-built

      - name: SPC Switch PHP version
        working-directory: build/static-php-cli/
        run: ./bin/spc switch-php-version "${{ env.COMPILE_PHP_VERSION }}"

      - name: SPC Build
        working-directory: build/static-php-cli/
        run: ./bin/spc build --build-micro "ctype,curl,dom,filter,libxml,mbstring,openssl,phar,simplexml,xml,xmlwriter,zlib"

      - name: PHP Micro combine
        working-directory: build/static-php-cli/
        run: ./bin/spc micro:combine "../bin/whatsdiff.phar" --output="../bin/${{ env.BINARY_NAME }}"

      - if: ${{ github.event_name == 'workflow_dispatch' }}
        name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}
          path: build/bin/${{ env.BINARY_NAME }}

      - if: ${{ github.event_name != 'workflow_dispatch' }}
        name: Upload binary to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.4.1
        with:
          files: build/bin/${{ env.BINARY_NAME }}
